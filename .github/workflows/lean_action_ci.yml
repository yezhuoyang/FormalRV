name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Layering check (QEC demand layer never imports System/Shor/Audit)
        run: python3 scripts/check_layering.py
      - uses: leanprover/lean-action@v1
