name: Documentation

# Build the FormalRV-only API docs and deploy them to GitHub Pages.
#
# The docs are produced by a small Python generator (scripts/gen_docs.py) that
# parses this project's own .lean sources and emits a static HTML site. It does
# NOT build Lean or mathlib, so the whole job runs in seconds and documents only
# FormalRV's declarations (not the entire mathlib closure).

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate FormalRV API docs
        run: python scripts/gen_docs.py --out site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
